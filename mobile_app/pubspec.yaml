name: smart_interior_ai
description: Smart AI Interior Designer with AR Visualization
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.5.0
  retrofit: ^4.1.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  camera: ^0.11.0
  ar_flutter_plugin: ^0.7.3
  model_viewer_plus: ^1.7.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  fl_chart: ^0.68.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  permission_handler: ^10.4.5
  flutter_dotenv: ^5.1.0
  uuid: ^4.4.2
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.2
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/models_3d/
