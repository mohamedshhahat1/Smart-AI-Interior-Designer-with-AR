name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Prepare container image names
        id: images
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "backend=ghcr.io/${repository}/backend" >> "$GITHUB_OUTPUT"
          echo "ai_service=ghcr.io/${repository}/ai-service" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:latest
            ${{ steps.images.outputs.backend }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ai_services/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ steps.images.outputs.ai_service }}:latest
            ${{ steps.images.outputs.ai_service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
